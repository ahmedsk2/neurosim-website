<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="Pediatric MCA MFV by age band">
  <style>
    .bg { fill: #081224; }
    .axis { stroke: #475569; stroke-width: 1; }
    .grid { stroke: #1f2a44; stroke-width: 0.5; }
    .label { fill: #e2e8f0; font: 12px sans-serif; }
    .axisLabel { fill: #94a3b8; font: 11px sans-serif; }
    .smallLabel { fill: #94a3b8; font: 10px sans-serif; }
    .curve { stroke: #5eead4; stroke-width: 2.2; fill: none; }
    .band { fill: rgba(94, 234, 212, 0.13); stroke: none; }
    .pt { fill: #fbbf24; }
    .title { fill: #f1f5f9; font: 600 14px sans-serif; }
    .placeholder { fill: #64748b; font: italic 10px sans-serif; }
    .marker { stroke: #f87171; stroke-width: 1.2; stroke-dasharray: 4 3; }
  </style>
  <rect class="bg" width="800" height="380"/>
  <text class="title" x="20" y="28">Pediatric MCA mean flow velocity (MFV) by age band, placeholder schematic</text>
  <g class="grid">
    <line x1="80" y1="60" x2="780" y2="60"/>
    <line x1="80" y1="120" x2="780" y2="120"/>
    <line x1="80" y1="180" x2="780" y2="180"/>
    <line x1="80" y1="240" x2="780" y2="240"/>
    <line x1="80" y1="300" x2="780" y2="300"/>
  </g>
  <line class="axis" x1="80" y1="50" x2="80" y2="320"/>
  <line class="axis" x1="80" y1="320" x2="780" y2="320"/>
  <text class="axisLabel" x="20" y="190" transform="rotate(-90 20,190)">MCA MFV (cm/s)</text>
  <text class="axisLabel" x="40" y="65">120</text>
  <text class="axisLabel" x="50" y="125">100</text>
  <text class="axisLabel" x="58" y="185">80</text>
  <text class="axisLabel" x="58" y="245">60</text>
  <text class="axisLabel" x="58" y="305">40</text>
  <text class="axisLabel" x="58" y="325">20</text>
  <line class="marker" x1="80" y1="195" x2="780" y2="195"/>
  <text class="smallLabel" x="690" y="190">adult mean ≈ 55</text>
  <path class="band" d="M120 260 Q200 220 280 145 Q360 105 440 110 Q520 130 600 165 Q680 220 760 230 L760 245 Q680 240 600 195 Q520 165 440 145 Q360 145 280 175 Q200 245 120 280 Z"/>
  <path class="curve" d="M120 270 Q200 230 280 155 Q360 115 440 120 Q520 140 600 175 Q680 230 760 240"/>
  <circle class="pt" cx="120" cy="270" r="4"/>
  <circle class="pt" cx="200" cy="223" r="4"/>
  <circle class="pt" cx="280" cy="155" r="4"/>
  <circle class="pt" cx="360" cy="120" r="4"/>
  <circle class="pt" cx="440" cy="120" r="4"/>
  <circle class="pt" cx="520" cy="140" r="4"/>
  <circle class="pt" cx="600" cy="175" r="4"/>
  <circle class="pt" cx="680" cy="220" r="4"/>
  <circle class="pt" cx="760" cy="240" r="4"/>
  <g class="axisLabel">
    <text x="100" y="340">term</text>
    <text x="180" y="340">3 mo</text>
    <text x="260" y="340">6 mo</text>
    <text x="345" y="340">1–3 y</text>
    <text x="425" y="340">4–6 y</text>
    <text x="505" y="340">7–11 y</text>
    <text x="585" y="340">12–18 y</text>
    <text x="665" y="340">young adult</text>
    <text x="745" y="340">adult</text>
  </g>
  <text class="smallLabel" x="20" y="365">Sources: Bode 1988, O'Brien 2015, LaRovere 2022. Peak ~4–6 yr (~97 cm/s); adult ~55. Shaded band = ±SD.</text>
  <text class="placeholder" x="20" y="378">PLACEHOLDER, TODO: polish (Fig. 3 on TCD page).</text>
</svg>
