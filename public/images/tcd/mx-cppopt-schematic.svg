<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="Mx versus CPP U-curve with CPPopt vertex">
  <style>
    .bg { fill: #081224; }
    .axis { stroke: #475569; stroke-width: 1; }
    .grid { stroke: #1f2a44; stroke-width: 0.5; }
    .label { fill: #e2e8f0; font: 12px sans-serif; }
    .smallLabel { fill: #94a3b8; font: 10px sans-serif; }
    .title { fill: #f1f5f9; font: 600 14px sans-serif; }
    .placeholder { fill: #64748b; font: italic 10px sans-serif; }
    .curve { stroke: #fbbf24; stroke-width: 2.5; fill: none; }
    .threshold { stroke: #f87171; stroke-width: 1.2; stroke-dasharray: 4 3; }
    .targetBand { fill: rgba(94, 234, 212, 0.15); }
    .opt { stroke: #5eead4; stroke-width: 2; stroke-dasharray: 6 4; }
    .lla { stroke: #c084fc; stroke-width: 1.2; stroke-dasharray: 2 3; }
    .pt { fill: #5eead4; }
  </style>
  <rect class="bg" width="800" height="380"/>
  <text class="title" x="20" y="28">Mx vs CPP U-curve, CPPopt at the vertex (placeholder schematic)</text>
  <g class="grid">
    <line x1="80" y1="80" x2="760" y2="80"/>
    <line x1="80" y1="160" x2="760" y2="160"/>
    <line x1="80" y1="240" x2="760" y2="240"/>
  </g>
  <line class="axis" x1="80" y1="60" x2="80" y2="320"/>
  <line class="axis" x1="80" y1="320" x2="760" y2="320"/>
  <text class="smallLabel" x="40" y="80">+0.6</text>
  <text class="smallLabel" x="40" y="160">+0.3</text>
  <text class="smallLabel" x="40" y="240">0.0</text>
  <text class="smallLabel" x="40" y="300">-0.3</text>
  <text class="label" x="20" y="190" transform="rotate(-90 20,190)">Mx (correlation)</text>
  <text class="label" x="400" y="350">CPP (mmHg)</text>
  <g class="smallLabel">
    <text x="155" y="338">40</text>
    <text x="265" y="338">50</text>
    <text x="375" y="338">60</text>
    <text x="485" y="338">70</text>
    <text x="595" y="338">80</text>
    <text x="705" y="338">90</text>
  </g>
  <rect class="targetBand" x="430" y="60" width="80" height="260"/>
  <line class="threshold" x1="80" y1="160" x2="760" y2="160"/>
  <text class="smallLabel" x="690" y="155">Mx = +0.3 (impaired)</text>
  <path class="curve" d="M150 100 Q200 140 250 180 Q310 220 360 250 Q420 268 470 260 Q540 230 600 195 Q680 130 740 95"/>
  <line class="opt" x1="470" y1="60" x2="470" y2="320"/>
  <line class="lla" x1="280" y1="60" x2="280" y2="320"/>
  <line class="lla" x1="660" y1="60" x2="660" y2="320"/>
  <circle class="pt" cx="470" cy="260" r="5"/>
  <text class="label" x="430" y="50">CPPopt</text>
  <text class="smallLabel" x="240" y="50">LLA</text>
  <text class="smallLabel" x="620" y="50">ULA</text>
  <text class="smallLabel" x="20" y="370">Target band = CPPopt ± 5 mmHg. Vertex of fitted parabola gives CPPopt; intersections with Mx = +0.3 define LLA / ULA.</text>
  <text class="placeholder" x="600" y="370">PLACEHOLDER, Fig. 5</text>
</svg>
