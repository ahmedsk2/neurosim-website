<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="Astrup CBF thresholds">
  <style>
    .bg { fill: #081224; }
    .grid { stroke: #1f2a44; stroke-width: 0.5; }
    .axis { stroke: #475569; stroke-width: 1; }
    .title { fill: #f1f5f9; font: 600 14px sans-serif; }
    .sub { fill: #94a3b8; font: 11px sans-serif; }
    .label { fill: #e2e8f0; font: 12px sans-serif; }
    .small { fill: #94a3b8; font: 10px sans-serif; }
    .placeholder { fill: #64748b; font: italic 10px sans-serif; }
    .curve { stroke: #5eead4; stroke-width: 2; fill: none; }
    .curveFill { fill: rgba(94, 234, 212, 0.15); stroke: #5eead4; stroke-width: 1.5; }
    .accent { fill: #fbbf24; stroke: #fbbf24; }
    .danger { fill: #f87171; stroke: #f87171; }
    .ok { fill: #22c55e; stroke: #22c55e; }
    .purple { fill: #c084fc; stroke: #c084fc; }
    .box { fill: #0f1c34; stroke: #334155; stroke-width: 1; }
    .arrow { stroke: #94a3b8; stroke-width: 1; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 4 3; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="bg" width="800" height="380"/>
  <text class="title" x="20" y="28">Astrup CBF thresholds, placeholder schematic</text>
  <text class="sub" x="20" y="48">Oligemia (~20), electrical failure (~15), membrane failure (~10), infarction (~6) mL/100g/min.</text>
  <g class="grid">
    <line x1="60" y1="90" x2="780" y2="90"/>
    <line x1="60" y1="160" x2="780" y2="160"/>
    <line x1="60" y1="230" x2="780" y2="230"/>
    <line x1="60" y1="300" x2="780" y2="300"/>
  </g>
  <line class="axis" x1="60" y1="60" x2="60" y2="310"/>
  <line class="axis" x1="60" y1="310" x2="780" y2="310"/><rect class="curveFill" x="110" y="250" width="80" height="60"/><text class="small" x="150" y="325" text-anchor="middle">neonate</text><text class="label" x="150" y="244" text-anchor="middle">11</text><rect class="curveFill" x="240" y="200" width="80" height="110"/><text class="small" x="280" y="325" text-anchor="middle">infant</text><text class="label" x="280" y="194" text-anchor="middle">16</text><rect class="curveFill" x="370" y="150" width="80" height="160"/><text class="small" x="410" y="325" text-anchor="middle">child</text><text class="label" x="410" y="144" text-anchor="middle">21</text><rect class="curveFill" x="500" y="110" width="80" height="200"/><text class="small" x="540" y="325" text-anchor="middle">adolescent</text><text class="label" x="540" y="104" text-anchor="middle">25</text><rect class="curveFill" x="630" y="90" width="80" height="220"/><text class="small" x="670" y="325" text-anchor="middle">adult</text><text class="label" x="670" y="84" text-anchor="middle">27</text>
  <text class="placeholder" x="20" y="370">PLACEHOLDER, TODO: polish (foundations/astrup-cascade/astrup-thresholds.svg).</text>
</svg>
